<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>مراجعة تفاعلية</title>
<style>
body {font-family: Arial; background:#f5f5f5; text-align:center;}
.box {background:white; padding:20px; margin:50px auto; width:70%; border-radius:10px;}
button {padding:10px 20px; margin:10px;}
.correct {color:green;}
.wrong {color:red;}
</style>
</head>
<body>
<div class="box">
<h2 id="question"></h2>
<div id="answers"></div>
<p id="feedback"></p>
</div>
<script>
let qIndex=0;
const questions=[
{q:"لتطبيق تنسيق العملة على الخلايا نستخدم مجموعة؟",options:["محاذاة","أرقام","خط","تحرير"],answer:1},
{q:"لإدراج ورقة عمل جديدة نضغط؟",options:["-","+","×","/"],answer:1},
{q:"نوع المخطط لإظهار التغير بمرور الوقت؟",options:["دائري","خطي","شريطي","مبعثر"],answer:1},
{q:"للبدء بعرض الشرائح من البداية؟",options:["F5","Esc","F1","Enter"],answer:0}
];
function loadQ(){
let q=questions[qIndex];
document.getElementById("question").innerText=q.q;
let ansHTML="";
q.options.forEach((opt,i)=>{
ansHTML+=`<button onclick=check(${i})>${opt}</button>`;
});
document.getElementById("answers").innerHTML=ansHTML;
document.getElementById("feedback").innerText="";
}
function check(i){
if(i===questions[qIndex].answer){
document.getElementById("feedback").innerHTML='<span class="correct">إجابة صحيحة أحسنت!</span>';
qIndex++;
if(qIndex<questions.length){
setTimeout(loadQ,1000);
}else{
document.getElementById("question").innerText="انتهيت! بالتوفيق والنجاح";
document.getElementById("answers").innerHTML="";
}
}else{
document.getElementById("feedback").innerHTML='<span class="wrong">إجابة خاطئة حاول مرة أخرى</span>';
}
}
loadQ();
</script>
</body>
</html>
